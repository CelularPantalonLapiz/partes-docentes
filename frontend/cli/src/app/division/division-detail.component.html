<div class="container mt-4" *ngIf="division">
  <div class="d-flex align-items-center mb-5">
    <h2 class="me-5 fw-normal mb-0">
      {{ division.id > 0 && !router.url.includes('new') ? "Editar" : "Nueva" }} División
    </h2>
    <button 
      (click)="save()" 
      [disabled]="!isFormValid()"
      class="btn btn-success border border-dark border-2 rounded-pill px-4 me-3 py-2 text-white fw-bold" 
      [style.opacity]="isFormValid() ? '1' : '0.5'"
      [style.cursor]="isFormValid() ? 'pointer' : 'not-allowed'"
      style="background-color: #a3cf95; color: black !important;">
      Guardar
    </button>

    <button (click)="goBack()" class="btn btn-danger border border-dark border-2 rounded-pill px-4 py-2 fw-bold" 
            style="background-color: #d195a3; color: black !important;">
      Cancelar
    </button>
  </div>

  <div class="row g-4">
    
    <div class="col-md-6 d-flex align-items-center">
      <span class="badge bg-secondary me-2 p-2 fs-6 border border-dark rounded-1" 
            style="min-width: 110px; background-color: #999 !important;">Año</span>
      <input type="number" class="form-control border-dark border-2 rounded-0" 
             [(ngModel)]="division.anio" placeholder="Ej: 1">
    </div>

    <div class="col-md-6 d-flex align-items-center">
      <span class="badge bg-secondary me-2 p-2 fs-6 border border-dark rounded-1" 
            style="min-width: 110px; background-color: #999 !important;">Número</span>
      <input type="number" class="form-control border-dark border-2 rounded-0" 
             [(ngModel)]="division.numDivision" placeholder="Ej: 2">
    </div>

    <div class="col-md-6 d-flex align-items-center">
      <span class="badge bg-secondary me-2 p-2 fs-6 border border-dark rounded-1" 
            style="min-width: 110px; background-color: #999 !important;">Orientación</span>
      <input type="text" class="form-control border-dark border-2 rounded-0" 
             [(ngModel)]="division.orientacion" placeholder="Ej: Ciencias Naturales">
    </div>

    <div class="col-md-6 d-flex align-items-center">
      <span class="badge bg-secondary me-2 p-2 fs-6 bsorder border-dark rounded-1" 
            style="min-width: 110px; background-color: #999 !important;">Turno</span>
      <select class="form-select border-dark border-2 rounded-0" [(ngModel)]="division.turno">
        <option *ngFor="let t of turnos" [value]="t">{{ t }}</option>
      </select>
    </div>

  </div>
</div>
